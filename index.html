<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UET Chat - Kết nối sinh viên Công nghệ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .hidden-section { display: none; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex items-center justify-center">

    <div id="auth-screen" class="w-full h-full flex items-center justify-center bg-gradient-to-br from-blue-600 to-indigo-900 absolute z-50">
        <div class="glassmorphism p-10 rounded-2xl shadow-2xl w-96 text-center transition-all">
            <img src="https://uet.vnu.edu.vn/wp-content/uploads/2017/02/logo-uet.png" alt="UET Logo" class="w-24 mx-auto mb-6 bg-white p-2 rounded-full">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">UET Chat</h1>
            <p class="text-sm text-gray-600 mb-8">Dành riêng cho sinh viên VNU</p>
            
            <button id="btn-google-login" class="w-full bg-white border border-gray-300 text-gray-700 font-semibold py-3 px-4 rounded-lg shadow-sm hover:bg-gray-50 flex items-center justify-center gap-2 mb-4 transition-all">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                Tiếp tục với VNU Email
            </button>

            <div class="flex items-center my-4">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="px-3 text-gray-500 text-sm">Hoặc email/mật khẩu</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <input type="email" id="email-input" placeholder="MSSV@vnu.edu.vn" class="w-full px-4 py-3 rounded-lg border border-gray-300 mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password-input" placeholder="Mật khẩu" class="w-full px-4 py-3 rounded-lg border border-gray-300 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <button id="btn-email-login" class="w-full bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg shadow hover:bg-blue-700 transition-all">
                Đăng nhập / Đăng ký
            </button>
        </div>
    </div>

    <div id="main-app" class="hidden-section w-full h-full flex flex-row bg-gray-100">
        <div class="w-64 bg-white shadow-lg flex flex-col justify-between">
            <div>
                <div class="p-6 border-b flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold" id="user-avatar">U</div>
                    <div>
                        <p class="font-bold text-gray-800 text-sm" id="user-name">Đang tải...</p>
                        <p class="text-xs text-gray-500" id="user-email">@vnu.edu.vn</p>
                    </div>
                </div>
                <nav class="p-4 space-y-2">
                    <button class="w-full flex items-center gap-3 px-4 py-3 text-blue-600 bg-blue-50 rounded-lg font-medium"><i class="fas fa-home"></i> Bảng tin (Feed)</button>
                    <button class="w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg font-medium"><i class="fas fa-comment-dots"></i> Chat MSSV</button>
                    <button class="w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg font-medium"><i class="fas fa-folder-open"></i> Tài liệu UET</button>
                    <button class="w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 rounded-lg font-medium"><i class="fas fa-calendar-alt"></i> Lịch học</button>
                </nav>
            </div>
            <div class="p-4 border-t">
                <button id="btn-logout" class="w-full flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-lg font-medium transition-all">
                    <i class="fas fa-sign-out-alt"></i> Đăng xuất
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm h-16 flex items-center px-8">
                <h2 class="text-xl font-bold text-gray-800">Bảng tin cộng đồng</h2>
            </header>
            
            <main class="flex-1 overflow-y-auto p-8">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6">
                    <textarea class="w-full resize-none outline-none text-gray-700 text-lg" rows="2" placeholder="Hôm nay ở UET có gì vui?"></textarea>
                    <div class="flex justify-between items-center mt-4 pt-4 border-t border-gray-100">
                        <div class="flex gap-4 text-gray-500">
                            <button class="hover:text-blue-500"><i class="fas fa-image"></i> Ảnh</button>
                            <button class="hover:text-blue-500"><i class="fas fa-video"></i> Video</button>
                            <button class="hover:text-blue-500"><i class="fas fa-file-alt"></i> Tài liệu</button>
                        </div>
                        <button class="bg-blue-600 text-white px-6 py-2 rounded-full font-medium hover:bg-blue-700">Đăng bài</button>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 rounded-full bg-gray-300"></div>
                        <div>
                            <p class="font-bold text-gray-800">Sinh viên A</p>
                            <p class="text-xs text-gray-500">2 giờ trước</p>
                        </div>
                    </div>
                    <p class="text-gray-700 mb-4">Đã ai làm xong bài tập Vật lý Kỹ thuật chưa ạ? Cho mình xin ít tài liệu tham khảo với! 😭</p>
                    <div class="flex gap-6 text-gray-500 text-sm mt-4 pt-4 border-t border-gray-100">
                        <button class="hover:text-blue-600"><i class="far fa-thumbs-up"></i> Thích</button>
                        <button class="hover:text-blue-600"><i class="far fa-comment"></i> Bình luận</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        // BẠN CẦN THAY THẾ CÁC THÔNG SỐ NÀY TỪ FIREBASE PROJECT CỦA BẠN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        /* ========================================================
        HƯỚNG DẪN CÀI ĐẶT FIREBASE:
        1. Vào console.firebase.google.com tạo project "UET Chat"
        2. Kích hoạt Authentication (Google & Email/Password)
        3. Copy Firebase Config dán vào biến firebaseConfig dưới đây
        ========================================================
        */
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        // const app = initializeApp(firebaseConfig); // Bỏ comment khi có config thật
        // const auth = getAuth(app);
        
        // MÔ PHỎNG LOGIC GIAO DIỆN KHI CHƯA CÓ FIREBASE CONFIG THẬT
        const authScreen = document.getElementById('auth-screen');
        const mainApp = document.getElementById('main-app');
        const btnGoogleLogin = document.getElementById('btn-google-login');
        const btnLogout = document.getElementById('btn-logout');

        btnGoogleLogin.addEventListener('click', () => {
            // Logic thật sẽ như sau:
            /*
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ hd: 'vnu.edu.vn' }); // Chỉ cho phép mail VNU
            signInWithPopup(auth, provider).then((result) => {
                // Đăng nhập thành công
            }).catch((error) => alert(error.message));
            */
            
            // Chuyển UI để demo
            authScreen.style.opacity = '0';
            setTimeout(() => {
                authScreen.classList.add('hidden-section');
                mainApp.classList.remove('hidden-section');
            }, 300);
        });

        btnLogout.addEventListener('click', () => {
            // signOut(auth);
            mainApp.classList.add('hidden-section');
            authScreen.classList.remove('hidden-section');
            authScreen.style.opacity = '1';
        });
    </script>
</body>
</html>
